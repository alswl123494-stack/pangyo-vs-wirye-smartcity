<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판교 vs 청라 스마트시티 분석</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>판교테크노밸리 vs 청라국제업무지구</h1>
    <p class="subtitle">지하철 네트워크 등시간권 비교</p>

    <div class="controls">
      <div id="time-toggle" class="toggle-group">
        <label>등시간권:</label>
        <button class="toggle-btn active" data-min="30">30분</button>
        <button class="toggle-btn" data-min="60">60분</button>
      </div>
      <div id="view-toggle" class="toggle-group">
        <label>보기 모드:</label>
        <button class="toggle-btn active" data-mode="split">나란히</button>
        <button class="toggle-btn" data-mode="overlay">겹쳐보기</button>
      </div>
      <div id="layer-toggle" class="toggle-group">
        <label>레이어:</label>
        <button class="toggle-btn active" data-layer="isochrone">등시간권</button>
        <button class="toggle-btn" data-layer="landuse">토지이용</button>
      </div>
    </div>

    <div id="map-stage" class="map-stage">
      <div id="map-pangyo" class="map"></div>
      <div id="map-cheongna" class="map"></div>
    </div>

    <div id="landuse-legend" class="legend"></div>

    <div class="stats">
      <div class="stat-card pangyo">
        <div class="stat-title">판교 - 도달가능 종사자</div>
        <div class="stat-value" id="stat-pangyo">—</div>
        <div class="stat-sub" id="stat-pangyo-sub">—</div>
      </div>
      <div class="stat-compare">
        <div id="compare-text">—</div>
      </div>
      <div class="stat-card cheongna">
        <div class="stat-title">청라 - 도달가능 종사자</div>
        <div class="stat-value" id="stat-cheongna">—</div>
        <div class="stat-sub" id="stat-cheongna-sub">—</div>
      </div>
    </div>

    <section class="curve-section">
      <h2>누적 접근성 곡선</h2>
      <p class="curve-caption">핵심역에서 출발해 t분 이내 도달 가능한 역 수의 변화 (0~60분)</p>
      <canvas id="curve-chart" height="220"></canvas>
    </section>

    <section class="curve-section">
      <h2>용도지역 필지 구성비</h2>
      <p class="curve-caption">반경 1.2km 내 용도지역별 면적 기준 구성비</p>
      <canvas id="landuse-composition-chart" height="250"></canvas>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
